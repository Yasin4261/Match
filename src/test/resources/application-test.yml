spring:
  autoconfigure:
    exclude:
      - org.springframework.boot.autoconfigure.mail.MailSenderAutoConfiguration
      - org.springframework.boot.actuate.autoconfigure.mail.MailHealthContributorAutoConfiguration
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG10Dialect

management:
  health:
    mail:
      enabled: false
    redis:
      enabled: false

app:
  jwt:
    secret: test-test-test-test-test-test-test-test-secret-32chars
    access-ttl-minutes: 5
    refresh-ttl-days: 1
  minio:
    endpoint: http://localhost:9000
    access-key: test
    secret-key: testtest
    bucket: photos-test
  turn:
    secret: test-turn-secret
    urls: turn:localhost:3478?transport=udp
    ttl-seconds: 60


