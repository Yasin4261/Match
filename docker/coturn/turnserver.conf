# coturn configuration for Match API (development)
# Reference: https://github.com/coturn/coturn

# Listening
listening-port=3478
tls-listening-port=5349
listening-ip=0.0.0.0
fingerprint

# Relay (open this UDP port range in your firewall)
min-port=49160
max-port=49200

# Authentication: time-limited credentials shared with API via TURN_SECRET
use-auth-secret
static-auth-secret=turnsecret-change-me

# Realm
realm=match.local

# No-loopback / safety
no-multicast-peers
no-cli
# no-tls and no-dtls disabled here -> uncomment for prod with proper certs:
# cert=/etc/coturn/certs/fullchain.pem
# pkey=/etc/coturn/certs/privkey.pem

# Logging
log-file=stdout
verbose

