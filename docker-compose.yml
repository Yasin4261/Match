name: match-platform

services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: match-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER} -d $${POSTGRES_DB}"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [match-net]

  redis:
    image: redis:7-alpine
    container_name: match-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [match-net]

  minio:
    image: minio/minio:latest
    container_name: match-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ACCESS_KEY}
      MINIO_ROOT_PASSWORD: ${MINIO_SECRET_KEY}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 5s
      timeout: 3s
      retries: 20
    networks: [match-net]

  minio-init:
    image: minio/mc:latest
    container_name: match-minio-init
    depends_on:
      minio:
        condition: service_healthy
    entrypoint: >
      /bin/sh -c "
      mc alias set local http://minio:9000 ${MINIO_ACCESS_KEY} ${MINIO_SECRET_KEY} &&
      mc mb -p local/${MINIO_BUCKET} || true &&
      mc anonymous set download local/${MINIO_BUCKET} || true &&
      echo 'minio bucket ready'
      "
    networks: [match-net]

  mailhog:
    image: mailhog/mailhog:latest
    container_name: match-mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
    networks: [match-net]

  adminer:
    image: adminer:latest
    container_name: match-adminer
    ports:
      - "8081:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks: [match-net]

  coturn:
    image: coturn/coturn:latest
    container_name: match-coturn
    network_mode: host  # required for proper relay; comment out if not on Linux
    volumes:
      - ./docker/coturn/turnserver.conf:/etc/coturn/turnserver.conf:ro
    command: ["-c", "/etc/coturn/turnserver.conf"]

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: match-api
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_healthy
    environment:
      SPRING_PROFILES_ACTIVE: ${SPRING_PROFILES_ACTIVE}
      POSTGRES_HOST: ${POSTGRES_HOST}
      POSTGRES_PORT: ${POSTGRES_PORT}
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      REDIS_HOST: ${REDIS_HOST}
      REDIS_PORT: ${REDIS_PORT}
      MINIO_ENDPOINT: ${MINIO_ENDPOINT}
      MINIO_ACCESS_KEY: ${MINIO_ACCESS_KEY}
      MINIO_SECRET_KEY: ${MINIO_SECRET_KEY}
      MINIO_BUCKET: ${MINIO_BUCKET}
      MAIL_HOST: ${MAIL_HOST}
      MAIL_PORT: ${MAIL_PORT}
      JWT_SECRET: ${JWT_SECRET}
      TURN_SECRET: ${TURN_SECRET}
      TURN_URLS: ${TURN_URLS}
    ports:
      - "8080:8080"
    networks: [match-net]

volumes:
  pgdata:
  redisdata:
  miniodata:

networks:
  match-net:
    driver: bridge

